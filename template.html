<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      background: #1e1e1e; /* OR background image below */
      /* background: url("background.png") center / cover no-repeat; */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .canvas {
      width: 1920px;
      height: 1080px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <img src="heading.svg" />
    <img src="body.svg" />
  </div>
</body>
</html>
